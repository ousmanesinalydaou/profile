name: Generate 3D Contribution Graph

on:
  schedule:
    # runs every day at 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ousmanesinalydaou
        with:
          output_dir: profile-3d-contrib
          # This creates multiple themes; we will reference one in README
          # The action will output files like:
          # profile-3d-contrib/profile-night-rainbow.svg
          # profile-3d-contrib/profile-gitblock.svg
          # etc.

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib || true
          git commit -m "chore: update 3D contribution graph" || echo "No changes to commit"
          git push
